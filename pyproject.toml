[project]
name = "harmonist"
version = "0.1.0"
dependencies = ["mutagen", "bandcampsync", "fastapi", "jinja2", "httpx", "beautifulsoup4", "musicbrainzngs", "pydantic", "python-multipart"]

[tool.setuptools.packages]
find = {where = ["src"], include = ["harmonist*"]}

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
