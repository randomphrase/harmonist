<div id="task-{{ album.id }}" 
     class="p-4 rounded-lg bg-h-slate border border-amber-500/50 shadow-lg">
    
    <div class="flex items-center mb-4">
        <img src="{{ album.cover_url }}" alt="{{ album.title }} Cover" class="w-16 h-16 rounded shadow mr-4 object-cover">
        <div class="flex-grow">
            <div class="flex items-center gap-2">
                <h3 class="text-lg font-bold text-white">{{ album.title }}</h3>
                <span class="px-2 py-0.5 text-xs font-semibold rounded-full bg-amber-500/10 text-amber-500 border border-amber-500/30">Ambiguous</span>
            </div>
            <p class="text-slate-400 text-sm font-medium">{{ album.artist }} ({{ album.track_count }} Tracks)</p>
        </div>
    </div>

    <div class="space-y-2">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Potential MusicBrainz Matches</p>
        {% for match in matches %}
        <div class="flex items-center justify-between p-3 rounded bg-h-charcoal border border-slate-700 hover:border-amber-500/50 transition group">
            <div class="flex-grow">
                <div class="text-sm font-bold text-slate-200">{{ match.title }}</div>
                <div class="text-[10px] text-slate-500">
                    {{ match.date or 'Unknown Date' }} • {{ match.country or 'Unknown' }} • {{ match.status }}
                </div>
            </div>
            <button hx-post="/match/{{ album.id }}/{{ match.id }}" 
                    hx-target="#task-{{ album.id }}" 
                    hx-swap="outerHTML"
                    class="px-3 py-1.5 bg-slate-800 text-slate-300 text-xs font-bold rounded hover:bg-amber-500 hover:text-white transition">
                Select
            </button>
        </div>
        {% endfor %}
        
        <div class="pt-2 flex justify-end">
            <button hx-post="/seed/{{ album.id }}" 
                    hx-target="#task-{{ album.id }}" 
                    hx-swap="outerHTML"
                    class="text-[10px] font-bold text-slate-500 hover:text-mb-purple transition uppercase tracking-widest">
                None of these match (Force Seed)
            </button>
        </div>
    </div>
</div>
