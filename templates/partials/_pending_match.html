{# Inline Match panel for one potential download (replaces its card). Search the
   on-disk library; Link writes the purchase's item_id onto the chosen album. #}
<div id="pending-{{ p.item_id }}" class="rounded-lg border border-accent bg-accent-soft px-4 py-3 space-y-2">
    <div class="text-sm">
        Match <span class="font-semibold">{{ p.band }} — {{ p.title }}</span> to an album you already have:
    </div>
    <input type="search" name="q" placeholder="search your library by artist, title or folder…"
           hx-get="/pending/{{ p.item_id }}/match/results"
           hx-trigger="keyup changed delay:250ms, search"
           hx-target="#match-results-{{ p.item_id }}"
           class="w-full px-2 py-1 text-sm border border-line rounded bg-white" autofocus>
    <div id="match-results-{{ p.item_id }}">
        {% include 'partials/_pending_match_results.html' %}
    </div>
    <div class="text-right">
        <button hx-get="/pending/{{ p.item_id }}/cancel" hx-target="#pending-{{ p.item_id }}" hx-swap="outerHTML"
                class="text-xs text-muted hover:text-ink transition">Cancel</button>
    </div>
</div>
