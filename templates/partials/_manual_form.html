{# Manual MBID assignment form — used by the New + Needs MBID cards.
   Expects: album (with album.id, album.title, album.artist) #}
<div class="space-y-2 mt-2">
    <form hx-post="/manual/{{ album.id }}/assign"
          hx-target="this" hx-swap="afterend"
          class="flex gap-2">
        <input type="text" name="mbid" required
               placeholder="MB release URL or 36-char MBID"
               class="flex-grow bg-white border border-line rounded px-3 py-1.5 text-xs text-ink focus:border-mb-purple outline-none font-mono">
        <button type="submit"
                class="px-3 py-1.5 bg-mb-purple/15 hover:bg-mb-purple/25 text-mb-purple border border-mb-purple/30 rounded text-xs font-bold uppercase tracking-widest transition">
            Assign &amp; Tag
        </button>
    </form>
    <details class="text-xs">
        <summary class="cursor-pointer text-muted hover:text-ink select-none">Or search MusicBrainz by name</summary>
        <form hx-post="/manual/{{ album.id }}/search"
              hx-target="#manual-search-{{ album.id }}"
              hx-swap="innerHTML"
              class="flex gap-2 mt-2">
            <input type="text" name="artist" value="{{ album.artist }}" placeholder="Artist"
                   class="flex-1 min-w-0 bg-white border border-line rounded px-3 py-1.5 text-xs text-ink focus:border-mb-purple outline-none">
            <input type="text" name="title" value="{{ album.title }}" placeholder="Album"
                   class="flex-1 min-w-0 bg-white border border-line rounded px-3 py-1.5 text-xs text-ink focus:border-mb-purple outline-none">
            <button type="submit"
                    class="px-3 py-1.5 bg-surface hover:bg-line text-ink border border-line rounded text-xs font-bold uppercase tracking-widest transition whitespace-nowrap">
                Search
            </button>
        </form>
        <div id="manual-search-{{ album.id }}" class="mt-2"></div>
    </details>
</div>
