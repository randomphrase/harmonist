{% set badge_class = 'bg-amber-500/10 text-amber-200 border border-amber-500/30' %}
{% set badge_label = 'Needs Sync' %}
<div id="task-{{ album.id }}" class="p-4 rounded-lg bg-h-slate border border-amber-500/30">
    {% include 'partials/_album_header.html' %}
    <p class="text-slate-500 text-xs mb-3">
        Tagged from MusicBrainz but the Bandcamp purchase isn't linked yet.
        Edit the URL below if needed, then run Sync.
    </p>
    <div class="flex flex-col gap-2">
        <form hx-post="/unconfirmed/{{ album.id }}/url" hx-target="this" hx-swap="afterend"
              class="flex gap-2">
            <input type="url" name="url" required
                   value="{{ album.sidecar.store_url if album.sidecar else '' }}"
                   placeholder="https://artist.bandcamp.com/album/..."
                   class="flex-grow bg-h-charcoal border border-slate-700 rounded px-3 py-1.5 text-xs text-white focus:border-bc-teal outline-none font-mono">
            <button type="submit"
                    class="px-3 py-1.5 bg-bc-teal/20 hover:bg-bc-teal/30 text-bc-teal border border-bc-teal/30 rounded text-xs font-bold uppercase tracking-widest transition">
                Update URL
            </button>
        </form>
        <button hx-post="/unconfirmed/{{ album.id }}/manual"
                hx-target="this" hx-swap="afterend"
                class="self-start px-3 py-1.5 bg-slate-700/40 hover:bg-slate-700/60 text-slate-300 border border-slate-600 rounded text-xs font-bold uppercase tracking-widest transition">
            Mark purchased elsewhere
        </button>
    </div>
</div>
