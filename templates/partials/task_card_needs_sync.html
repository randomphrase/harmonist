<div id="task-{{ album.id }}" class="p-4 rounded-lg bg-white border border-mb-orange/40">
    {% include 'partials/_album_header.html' %}
    <p class="text-muted text-xs mb-3">
        Tagged from MusicBrainz but the Bandcamp purchase isn't linked yet.
        Edit the URL below if needed, then run Sync.
    </p>
    <div class="flex flex-col gap-2">
        <form hx-post="/unconfirmed/{{ album.id }}/url" hx-target="this" hx-swap="afterend"
              class="flex gap-2">
            <input type="url" name="url" required
                   value="{{ album.sidecar.store_url if album.sidecar else '' }}"
                   placeholder="https://artist.bandcamp.com/album/..."
                   class="flex-grow bg-white border border-line rounded px-3 py-1.5 text-xs text-ink focus:border-grass outline-none font-mono">
            <button type="submit"
                    class="px-3 py-1.5 bg-grass hover:bg-grass-dark text-white rounded text-xs font-bold uppercase tracking-widest transition">
                Update URL
            </button>
        </form>
        <button hx-post="/unconfirmed/{{ album.id }}/manual"
                hx-target="this" hx-swap="afterend"
                class="self-start px-3 py-1.5 bg-white hover:bg-surface text-ink border border-line rounded text-xs font-bold uppercase tracking-widest transition">
            Mark purchased elsewhere
        </button>
    </div>
</div>
