<div id="task-{{ album.id }}" 
     class="flex items-center p-4 rounded-lg bg-h-slate/60 hover:bg-h-slate/90 transition border border-slate-700/50">
    
    <img src="{{ album.cover_url }}" alt="{{ album.title }} Cover" class="w-16 h-16 rounded shadow-lg mr-4 object-cover">
    
    <div class="flex-grow">
        <div class="flex items-center gap-2">
            <h3 class="text-lg font-bold text-white">{{ album.title }}</h3>
            <span class="px-2 py-0.5 text-xs font-semibold rounded-full bg-bc-teal/10 text-bc-teal border border-bc-teal/30">Bandcamp</span>
        </div>
        <p class="text-slate-400 text-sm font-medium">{{ album.artist }} ({{ album.track_count }} Tracks)</p>
    </div>

    <div class="flex gap-2">
        <button hx-post="/seed/{{ album.id }}" 
                hx-swap="outerHTML" 
                hx-target="#task-{{ album.id }}"
                class="flex items-center gap-2.5 px-5 py-2.5 rounded-md text-white font-semibold text-sm
                       bg-mb-purple hover:bg-mb-purple/90 active:scale-95 transition
                       shadow-md hover:shadow-lg">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
            Seed to MusicBrainz
        </button>
    </div>
</div>
