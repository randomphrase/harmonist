{% set badge_class = 'bg-surface text-muted border border-line' %}
{% set badge_label = 'New' %}
<div id="task-{{ album.id }}" class="p-4 rounded-lg bg-white border border-line">
    {% include 'partials/_album_header.html' %}
    <p class="text-muted text-xs mb-3">No <code>.harmonist.json</code> sidecar yet. Pick one:</p>

    <div class="flex gap-2 flex-wrap mb-3">
        <button hx-post="/reconcile/{{ album.id }}"
                hx-target="this" hx-swap="afterend"
                class="px-3 py-1.5 bg-grass hover:bg-grass-dark text-white rounded text-xs font-bold uppercase tracking-widest transition"
                title="Derive a sidecar from existing MB tags + ©cmt evidence">
            Reconcile from tags
        </button>
        <button hx-post="/recover/{{ album.id }}"
                hx-target="this" hx-swap="afterend"
                class="px-3 py-1.5 bg-white hover:bg-surface text-ink border border-line rounded text-xs font-bold uppercase tracking-widest transition"
                title="Read the file's ©cmt for a store URL">
            Recover store URL
        </button>
    </div>

    {% include 'partials/_manual_form.html' %}
</div>
