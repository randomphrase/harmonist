{# One page of the Library grid. The first page opens #library-grid (and the
   shared #album-detail-panel); subsequent pages (Load more) emit just tiles +
   their <template>s + a fresh Load-more, which replace the old button INSIDE
   the grid. <template> elements are inert (display:none) so their position
   among grid items doesn't affect layout. #}
{% if is_first_page %}
<div class="flex justify-between items-baseline mb-3">
    <h2 class="text-sm font-semibold text-muted uppercase tracking-widest">Library
        <span class="ml-1 font-normal normal-case tracking-normal">· {{ total_done }} done</span>
    </h2>
    <button hx-get="/library?offset=0&limit={{ limit }}"
            hx-target="#library-rows" hx-swap="innerHTML"
            class="text-xs text-muted hover:text-accent transition uppercase tracking-widest font-bold">
        Refresh
    </button>
</div>
{% endif %}

{% if is_first_page and not rows %}
<div class="p-10 text-center border border-line rounded-lg">
    <p class="text-muted italic">No fully-tagged albums yet.</p>
</div>
{% else %}
{% if is_first_page %}
<div id="library-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
    {# Full-width expanding detail; moved next to the clicked row's last tile by
       JS. Hidden (display:none) so it occupies no grid cell until opened. #}
    <div id="album-detail-panel" class="col-span-full hidden"></div>
{% endif %}

    {% for album in rows %}{% include 'partials/library_tile.html' %}{% endfor %}

    {% if has_more %}
    <button id="load-more-{{ next_offset }}"
            class="col-span-full mt-2 px-4 py-2 bg-surface hover:bg-line text-ink border border-line rounded text-sm font-bold transition"
            hx-get="/library?offset={{ next_offset }}&limit={{ limit }}"
            hx-target="this" hx-swap="outerHTML">
        Load more <span class="text-muted font-normal text-xs ml-2">{{ next_offset }} / {{ total_done }}</span>
    </button>
    {% endif %}

    {% for album in rows %}
    <template id="album-tpl-{{ album.id }}">{% include 'partials/library_detail.html' %}</template>
    {% endfor %}

{% if is_first_page %}
</div>
{% endif %}
{% endif %}
