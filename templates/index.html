{% extends 'base.html' %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center p-4 bg-h-slate/50 rounded-lg shadow-inner">
        <h1 class="text-3xl font-extrabold tracking-tight text-white">Inbox</h1>
    </div>

    {# Hidden JSON data sources — JS polls these and writes display content
       to #harmonist-status (in header.html). #}
    <div id="sync-status-pill"
         hx-get="/sync/status"
         hx-trigger="load, every 1500ms"
         hx-swap="innerHTML"
         class="hidden"></div>
    <div id="reconcile-status-source"
         hx-get="/reconcile/status"
         hx-trigger="load, every 2000ms"
         hx-swap="innerHTML"
         class="hidden"></div>

    <div id="task-list"
         hx-get="/tasks"
         hx-trigger="load, every 1500ms[document.querySelector('#sync-status-pill')?.dataset?.state==='running' || document.querySelector('#reconcile-status-source')?.dataset?.state==='running'], tasks-changed from:body"
         hx-swap="innerHTML"
         class="space-y-3">
        <div class="text-center py-10">
            <span class="text-slate-500 italic">Loading…</span>
        </div>
    </div>

    <section id="library" class="mt-10">
        <div id="library-rows"
             hx-get="/library?offset=0&limit=30"
             hx-trigger="load, library-refresh from:body, tasks-changed from:body"
             hx-swap="innerHTML">
            <div class="text-center py-6 text-slate-600 italic text-sm">Loading library…</div>
        </div>
    </section>
</div>

<script>
// Accordion behaviour for library rows — one expanded at a time.
function harmonistToggleRow(id) {
    const target = document.getElementById('exp-' + id);
    if (!target) return;
    const opening = target.classList.contains('hidden');
    document.querySelectorAll('[id^="exp-"]').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('[id^="chev-"]').forEach(el => el.classList.remove('rotate-180'));
    if (opening) {
        target.classList.remove('hidden');
        const chev = document.getElementById('chev-' + id);
        if (chev) chev.classList.add('rotate-180');
    }
}
</script>

<script>
// Single consolidated status bar (#harmonist-status). Three input sources:
//   1. /sync/status   — polled into #sync-status-pill (hidden)
//   2. /reconcile/status — polled into #reconcile-status-source (hidden)
//   3. action endpoints  — fire `harmonist-status` HX-Trigger events
//
// Display priority (highest wins):
//   sync running  >  reconcile running  >  most recent action flash  >  idle
//
// On the running→idle edge of either runner, also fires `library-refresh`
// so the Library section pulls in any newly-Complete/Incomplete albums.
(function () {
    const STATUS_EL_ID = 'harmonist-status';
    let lastSyncState = 'idle';
    let lastReconcileState = 'idle';
    let syncDisplay = null;       // current running-sync HTML, or null
    let reconcileDisplay = null;  // current running-reconcile HTML, or null
    let latestActionMessage = null;  // last flash text from an action, or null

    const esc = (s) => String(s).replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));

    function refreshLibrary() {
        document.body.dispatchEvent(new Event('library-refresh'));
    }

    function renderStatus() {
        const el = document.getElementById(STATUS_EL_ID);
        if (!el) return;
        if (syncDisplay) { el.innerHTML = syncDisplay; return; }
        if (reconcileDisplay) { el.innerHTML = reconcileDisplay; return; }
        if (latestActionMessage) { el.innerHTML = latestActionMessage; return; }
        el.innerHTML = '';
    }

    document.body.addEventListener('htmx:afterSwap', function (evt) {
        const targetId = evt.detail.target.id;

        // ----- Sync polling source -----
        if (targetId === 'sync-status-pill') {
            let data;
            try { data = JSON.parse(evt.detail.target.textContent); }
            catch (e) { return; }
            const pill = evt.detail.target;
            pill.dataset.state = data.state;

            if (lastSyncState === 'running' && data.state === 'idle') {
                refreshLibrary();
            }
            lastSyncState = data.state;

            const btn = document.getElementById('sync-button');
            if (data.state === 'running') {
                const details = data.current_item ? esc(data.current_item) : null;
                const pill = `<span class="px-3 py-0.5 bg-amber-500/15 text-amber-300 border border-amber-500/40 rounded-full font-bold text-xs">Syncing</span>`;
                syncDisplay = pill + (details ? `<span class="ml-2 text-slate-300">${details}</span>` : '');
                if (btn) { btn.disabled = true; btn.classList.add('opacity-40', 'cursor-not-allowed'); }
            } else {
                syncDisplay = null;
                // On sync completion, surface the summary as the latest message
                // unless another action has overwritten it more recently.
                if (data.last_error) {
                    latestActionMessage = renderActionMessage('Sync failed', data.last_error, 'error');
                } else if (data.finished_at) {
                    const summary = data.new_items ? `${data.new_items} new` : 'no new items';
                    latestActionMessage = renderActionMessage('Last sync', summary, 'info');
                }
                if (btn) { btn.disabled = false; btn.classList.remove('opacity-40', 'cursor-not-allowed'); }
            }
            renderStatus();
            return;
        }

        // ----- Reconcile polling source -----
        if (targetId === 'reconcile-status-source') {
            let data;
            try { data = JSON.parse(evt.detail.target.textContent); }
            catch (e) { return; }
            const src = evt.detail.target;
            src.dataset.state = data.state;

            if (lastReconcileState === 'running' && data.state === 'idle') {
                refreshLibrary();
            }
            lastReconcileState = data.state;

            if (data.state === 'running') {
                const prog = data.total ? `${data.completed}/${data.total}` : '';
                const item = data.current_item ? esc(data.current_item) : '';
                const details = [item, prog].filter(Boolean).join(' · ');
                const pill = `<span class="px-3 py-0.5 bg-mb-purple/15 text-mb-purple border border-mb-purple/40 rounded-full font-bold text-xs">Reconciling</span>`;
                reconcileDisplay = pill + (details ? `<span class="ml-2 text-slate-300">${details}</span>` : '');
            } else {
                reconcileDisplay = null;
            }
            renderStatus();
            return;
        }
    });

    // ----- Action flash messages -----
    // Routes emit
    //   HX-Trigger: {"harmonist-status": {"verb": "...", "details": "...", "level": "..."}}
    // We render the verb as a level-coloured pill, then the details in plain
    // text — keeps the bar visually light when details run long.
    function pillClasses(level) {
        if (level === 'error')   return 'bg-red-500/15 text-red-300 border border-red-500/40';
        if (level === 'warning') return 'bg-amber-500/15 text-amber-300 border border-amber-500/40';
        return 'bg-bc-teal/15 text-bc-teal border border-bc-teal/40';
    }
    function renderActionMessage(verb, details, level) {
        const pill = `<span class="px-3 py-0.5 rounded-full font-bold text-xs ${pillClasses(level)}">${esc(verb)}</span>`;
        if (!details) return pill;
        return pill + `<span class="ml-2 text-slate-300">${esc(details)}</span>`;
    }
    document.body.addEventListener('harmonist-status', function (evt) {
        const d = evt.detail || {};
        // New payload shape: {verb, details, level}. Tolerate old shape
        // {value, level} so existing inline calls keep working.
        const verb = d.verb !== undefined ? d.verb : (d.value !== undefined ? d.value : '');
        const details = d.details !== undefined ? d.details : null;
        const level = d.level || 'info';
        latestActionMessage = renderActionMessage(verb, details, level);
        renderStatus();
    });
})();
</script>
{% endblock %}
