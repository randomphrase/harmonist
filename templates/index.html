{% extends 'base.html' %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center p-4 bg-h-slate/50 rounded-lg shadow-inner">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white">Inbox</h1>
            <p class="text-slate-400 text-sm">{{ albums|length }} albums need attention · {{ total_albums }} total in library</p>
        </div>
        <div id="sync-status-pill"
             hx-get="/sync/status"
             hx-trigger="load, every 1500ms"
             hx-swap="innerHTML"
             class="text-xs text-slate-500"></div>
    </div>

    <div id="task-list"
         hx-get="/tasks"
         hx-trigger="load, every 1500ms[document.querySelector('#sync-status-pill')?.dataset?.state==='running'], tasks-changed from:body"
         hx-swap="innerHTML"
         class="space-y-3">
        <div class="text-center py-10">
            <span class="text-slate-500 italic">Loading…</span>
        </div>
    </div>
</div>

<script>
// Update the sync-status pill from /sync/status JSON
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'sync-status-pill') {
        try {
            const data = JSON.parse(evt.detail.target.textContent);
            const pill = evt.detail.target;
            pill.dataset.state = data.state;
            const btn = document.getElementById('sync-button');
            if (data.state === 'running') {
                pill.innerHTML = '<span class="px-3 py-1 bg-amber-500/10 text-amber-300 border border-amber-500/30 rounded-full font-bold uppercase tracking-widest">Syncing…</span>';
                if (btn) { btn.disabled = true; btn.classList.add('opacity-40', 'cursor-not-allowed'); }
            } else {
                let badge = '<span class="text-slate-600">Idle</span>';
                if (data.last_error) {
                    badge = `<span class="px-3 py-1 bg-red-500/10 text-red-300 border border-red-500/30 rounded-full font-bold uppercase tracking-widest">Sync failed</span>`;
                } else if (data.finished_at) {
                    badge = `<span class="text-slate-500">Last sync: ${data.new_items ? data.new_items + ' new' : 'no new items'}</span>`;
                }
                pill.innerHTML = badge;
                if (btn) { btn.disabled = false; btn.classList.remove('opacity-40', 'cursor-not-allowed'); }
            }
        } catch (e) { /* not JSON, ignore */ }
    }
});
</script>
{% endblock %}
